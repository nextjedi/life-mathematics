steps:
- task: DownloadSecureFile@1
  name: keystoreFile
  displayName: 'Download upload keystore'
  inputs:
    secureFile: 'upload-keystore.jks'

- script: |
    cp "$(keystoreFile.secureFilePath)" android/app/upload-keystore.jks
    printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=upload-keystore.jks\n' \
      "$(KEYSTORE_PASSWORD)" "$(KEY_PASSWORD)" "$(KEY_ALIAS)" \
      > android/key.properties
  displayName: 'Configure Android signing'
