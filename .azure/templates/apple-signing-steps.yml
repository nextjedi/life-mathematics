parameters:
- name: provisioningProfile
  type: string
- name: installerCertSecureFile
  type: string
  default: ''

steps:
- task: DownloadSecureFile@1
  name: ascKey
  displayName: 'Download App Store Connect API key'
  inputs:
    secureFile: 'AuthKey_KFMUN9Z5NJ.p8'

- task: InstallAppleCertificate@2
  displayName: 'Install Apple Distribution certificate'
  inputs:
    certSecureFile: 'distribution.p12'
    certPwd: '$(P12_PASSWORD)'
    keychain: 'temp'

- task: InstallAppleCertificate@2
  condition: ne('${{ parameters.installerCertSecureFile }}', '')
  displayName: 'Install Mac Installer Distribution certificate'
  inputs:
    certSecureFile: '${{ parameters.installerCertSecureFile }}'
    certPwd: '$(MAC_INSTALLER_P12_PASSWORD)'
    keychain: 'temp'

- task: InstallAppleProvisioningProfile@1
  displayName: 'Install provisioning profile'
  inputs:
    provisioningProfileLocation: 'secureFiles'
    provProfileSecureFile: '${{ parameters.provisioningProfile }}'
