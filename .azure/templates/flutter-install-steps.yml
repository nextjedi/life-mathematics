steps:
- task: Cache@2
  inputs:
    key: '"flutter-stable" | "$(Agent.OS)"'
    path: $(Pipeline.Workspace)/flutter
    cacheHitVar: FLUTTER_CACHE_HIT
  displayName: 'Cache Flutter SDK'

- script: |
    git clone https://github.com/flutter/flutter.git --depth 1 -b stable $(Pipeline.Workspace)/flutter
  condition: ne(variables.FLUTTER_CACHE_HIT, 'true')
  displayName: 'Install Flutter (stable)'

- script: echo "##vso[task.prependpath]$(Pipeline.Workspace)/flutter/bin"
  displayName: 'Add Flutter to PATH'

- script: |
    flutter --version
    flutter config --no-analytics
  displayName: 'Flutter version & config'

- task: Cache@2
  inputs:
    key: '"pub" | "$(Agent.OS)" | pubspec.lock'
    path: $(Pipeline.Workspace)/.pub-cache
    cacheHitVar: PUB_CACHE_HIT
  displayName: 'Cache pub packages'

- script: flutter pub get
  condition: ne(variables.PUB_CACHE_HIT, 'true')
  env:
    PUB_CACHE: $(Pipeline.Workspace)/.pub-cache
  displayName: 'pub get'
