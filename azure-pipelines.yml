# azure-pipelines.yml
# Copy this file to the ROOT of the life-mathematics repo as: azure-pipelines.yml
# See ONBOARDING.md in nextjedi/apps-ops for full setup instructions.
#
# Azure DevOps Library setup required before running:
#
# Variable groups (Library → Variable groups):
#   mobile-shared-signing   (Vsts)
#     ASC_KEY_ID            Apple App Store Connect API key ID
#     ASC_ISSUER_ID         Apple App Store Connect issuer ID
#     APPLE_TEAM_ID         DLQ4JM3YPQ
#
#   mobile-shared-secrets   (Key Vault linked)
#     ios-p12-password      Password for distribution.p12
#
#   app-life-mathematics    (Vsts)
#     ANDROID_PACKAGE_NAME  com.nextjedi.lifemathematics
#     IOS_BUNDLE_ID         com.nextjedi.lifemathematics
#     KEY_ALIAS             lifemathematics
#
#   app-life-mathematics-secrets  (Key Vault linked)
#     life-mathematics-keystore-password   Android keystore store password
#     life-mathematics-key-password        Android keystore key password
#
# Secure files (Library → Secure files):
#   upload-keystore.jks                              Android signing keystore (shared)
#   distribution.p12                                 iOS distribution certificate
#   ios-distribution.mobileprovision                 iOS App Store provisioning profile
#   AuthKey_KFMUN9Z5NJ.p8                            Apple App Store Connect API key
#   playstore-deployment-478918-37cdbda51809.json    Google service account key
#
# GitHub service connection:
#   endpoint: GitHub-nextjedi   (must have access to nextjedi/life-mathematics)

resources:
  repositories:
    - repository: devops-central
      type: github
      name: nextjedi/apps-ops
      ref: refs/heads/master
      endpoint: GitHub-nextjedi

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - "*.md"
      - docs/**

pr:
  branches:
    include:
      - main

extends:
  template: azure-pipelines/templates/flutter-deploy.yml@devops-central
  parameters:
    appVariableGroup: "app-life-mathematics"
    provisioningProfile: "ios-distribution.mobileprovision"
    keystorePasswordVar: "life-mathematics-keystore-password"
    keyPasswordVar: "life-mathematics-key-password"
